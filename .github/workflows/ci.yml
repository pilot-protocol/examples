name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go-examples:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          path: examples

      - name: Checkout web4
        uses: actions/checkout@v4
        with:
          repository: TeoSlayer/pilotprotocol
          path: web4

      - name: Checkout common
        uses: actions/checkout@v4
        with:
          repository: pilot-protocol/common
          path: common

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: examples/go/go.sum

      - name: Tidy Go examples (absorb web4 drift)
        working-directory: examples/go
        run: go mod tidy

      - name: Build Go examples
        working-directory: examples/go
        run: go build ./...

      - name: Test Go examples (compile smoke)
        working-directory: examples/go
        run: go test ./...

  python-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax-check Python examples
        run: |
          for f in $(find python_sdk -name '*.py'); do
            python -m py_compile "$f" || { echo "::error file=$f::syntax error"; exit 1; }
          done
          echo "all Python examples parse"

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Run Python example smoke tests
        working-directory: python_sdk
        run: python -m pytest tests/ -v

  shell-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax-check shell scripts
        run: |
          for f in $(find cli -name '*.sh'); do
            bash -n "$f" || { echo "::error file=$f::syntax error"; exit 1; }
          done
          echo "all shell scripts parse"
